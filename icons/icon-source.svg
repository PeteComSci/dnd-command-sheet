      <stop offset="100%" stop-color="#be8640" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#2d120f" flood-opacity="0.2" />
    </filter>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)" />
  <rect x="94" y="94" width="836" height="836" rx="190" fill="none" stroke="#644a37" stroke-width="18" opacity="0.35" />
  <g filter="url(#shadow)">
