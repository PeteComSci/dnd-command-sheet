    <path d="M512 180V280M724 306 644 360M796 556 688 524M654 806 602 682M370 848 420 708M188 620 304 564M232 332 334 390" fill="none" stroke="#f7d69c" stroke-width="16" stroke-linecap="round" />
    <path d="M512 280 334 390 304 564 420 708 602 682 688 524 644 360Z" fill="none" stroke="#7a2d38" stroke-width="14" stroke-linejoin="round" />
